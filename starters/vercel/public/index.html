<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accounting Workspace - starter</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; }
      code { background: #f2f2f2; padding: 0.1rem 0.3rem; border-radius: 0.2rem; }
    </style>
  </head>
  <body>
    <h1>Accounting Workspace</h1>
    <p>
      This is the placeholder front-end for the Vercel starter. Replace this
      directory with your real web app build output.
    </p>
    <p>
      API calls to <code>/api/*</code> are rewritten to your backend host
      (configure it in <code>vercel.json</code>).
    </p>
    <p id="status">Checking API health…</p>
    <script>
      fetch("/api/healthz")
        .then((r) => r.json())
        .then((d) => { document.getElementById("status").textContent = "API: " + JSON.stringify(d); })
        .catch(() => { document.getElementById("status").textContent = "API not reachable (set the rewrite target in vercel.json)."; });
    </script>
  </body>
</html>
